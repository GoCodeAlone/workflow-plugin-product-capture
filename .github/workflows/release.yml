name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
  packages: write
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Configure private Go modules
        env:
          RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN || github.token }}
        run: |
          git config --global url."https://x-access-token:${RELEASES_TOKEN}@github.com/GoCodeAlone/".insteadOf "https://github.com/GoCodeAlone/"
          go env -w GOPRIVATE=github.com/GoCodeAlone/*
          go env -w GONOSUMDB=github.com/GoCodeAlone/*
      - name: Install wfctl v0.74.6
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN || github.token }}
          WFCTL_VERSION: v0.74.6
        run: |
          set -euo pipefail
          runner_arch=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          asset="wfctl-linux-${runner_arch}"
          download_dir="$(mktemp -d)"
          gh release download "${WFCTL_VERSION}" \
            --repo GoCodeAlone/workflow \
            --pattern "${asset}" \
            --pattern checksums.txt \
            --dir "${download_dir}"
          (cd "${download_dir}" && grep "  ${asset}$" checksums.txt | sha256sum -c -)
          mkdir -p "${RUNNER_TEMP}/wfctl-bin"
          install -m 0755 "${download_dir}/${asset}" "${RUNNER_TEMP}/wfctl-bin/wfctl"
          echo "${RUNNER_TEMP}/wfctl-bin" >> "$GITHUB_PATH"
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WFCTL_BIN: ${{ runner.temp }}/wfctl-bin/wfctl
      # workflow#765: runtime truth-check via plugin verify-capabilities.
      - name: Verify capabilities (runtime truth-check)
        run: |
          RUNNER_ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          BIN=$(jq -r --arg arch "$RUNNER_ARCH" \
            '[.[] | select(.type=="Binary" and .goos=="linux" and .goarch==$arch and (.name|startswith("workflow-plugin-product-capture")))] | .[0].path // ""' \
            dist/artifacts.json)
          if [ -z "$BIN" ] || [ "$BIN" = "null" ]; then
            echo "::warning::No matching linux/$RUNNER_ARCH binary in dist/artifacts.json; skipping verify-capabilities"
            jq '.[] | {name, type, goos, goarch, path}' dist/artifacts.json
            exit 0
          fi
          "${{ runner.temp }}/wfctl-bin/wfctl" plugin verify-capabilities --binary "$BIN" .
  runtime-image:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CANDIDATE: ghcr.io/gocodealone/workflow-plugin-product-capture/product-capture-browser:${{ github.ref_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Configure private Go modules for runtime image
        env:
          RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN || github.token }}
        run: |
          git config --global url."https://x-access-token:${RELEASES_TOKEN}@github.com/GoCodeAlone/".insteadOf "https://github.com/GoCodeAlone/"
          go env -w GOPRIVATE=github.com/GoCodeAlone/*
          go env -w GONOSUMDB=github.com/GoCodeAlone/*
      - name: Build product capture provider binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o docker/product-capture-browser/product-capture-provider ./cmd/product-capture-provider
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push product capture browser image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/product-capture-browser/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ env.CANDIDATE }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.description=workflow-compute product capture runtime with Node, Playwright, and Google Chrome
      - name: Run exact candidate browser conformance
        run: |
          set -euo pipefail
          go run ./cmd/browser-runtime-conformance --image "$CANDIDATE" --output conformance.json
          jq -e '.verdict == "pass"' conformance.json
          tested_image_id=$(jq -r '.versions.image_id' conformance.json)
          if [ "$tested_image_id" != "${{ steps.build.outputs.imageid }}" ]; then
            echo "tested image ID does not match the loaded build" >&2
            exit 1
          fi
      - name: Push exact tested browser image
        id: promotion
        run: |
          set -euo pipefail
          tested_image_id=$(docker image inspect --format '{{.Id}}' "$CANDIDATE")
          if [ "$tested_image_id" != "${{ steps.build.outputs.imageid }}" ]; then
            echo "local candidate image ID changed after conformance" >&2
            exit 1
          fi
          docker push "$CANDIDATE"
          digest=$(docker buildx imagetools inspect "$CANDIDATE" --format '{{json .Manifest.Digest}}' | tr -d '"')
          if ! [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "registry returned invalid digest: $digest" >&2
            exit 1
          fi
          provider_image_ref="${CANDIDATE%:*}@${digest}"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "provider_image_ref=$provider_image_ref" >> "$GITHUB_OUTPUT"
      - name: Report tested runtime provenance
        run: |
          set -euo pipefail
          {
            echo "## Product capture browser runtime"
            echo
            echo "- provider_image_ref: \`${{ steps.promotion.outputs.provider_image_ref }}\`"
            echo "- Image ID: \`${{ steps.build.outputs.imageid }}\`"
            echo "- Registry digest: \`${{ steps.promotion.outputs.digest }}\`"
            echo "- BuildKit digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- Chrome version: \`$(jq -r '.versions.chrome' conformance.json)\`"
            echo "- Playwright version: \`$(jq -r '.versions.playwright' conformance.json)\`"
            echo "- Xvfb version: \`$(jq -r '.versions.xvfb' conformance.json)\`"
            echo
            echo "<details><summary>conformance.json</summary>"
            echo
            echo '```json'
            cat conformance.json
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release, runtime-image]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
      - name: Notify workflow-registry of new release
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          repository: GoCodeAlone/workflow-registry
          event-type: plugin-release
          client-payload: >-
            {"plugin": "workflow-plugin-product-capture", "tag": "${{ github.ref_name }}"}
