name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
  packages: write
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish GitHub release
        if: ${{ success() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
  runtime-image:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push product capture browser image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/product-capture-browser/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/gocodealone/workflow-plugin-product-capture/product-capture-browser:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.description=workflow-compute product capture runtime with Node, Playwright, and Google Chrome
      - name: Report runtime image digest
        run: |
          echo "Runtime image: ghcr.io/gocodealone/workflow-plugin-product-capture/product-capture-browser@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
  notify-registry:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release, runtime-image]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Notify workflow-registry of new release
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697  # v4
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}
          repository: GoCodeAlone/workflow-registry
          event-type: plugin-release
          client-payload: >-
            {"plugin": "workflow-plugin-product-capture", "tag": "${{ github.ref_name }}"}
